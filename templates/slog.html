<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}

.loginbox{
    width:100%;
    max-width:400px;
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:30px;
}

.loginbox p{
    margin-bottom:8px;
    color:#555;
    font-weight:500;
}

.loginbox input[type="email"],
.loginbox input[type="password"]{
    width:100%;
    padding:12px 15px;
    margin-bottom:20px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

.loginbox input:focus{
    outline:none;
    border-color:#667eea;
}

.loginbox input[type="button"]{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.loginbox input[type="button"]:hover{
    transform:translateY(-2px);
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    display:block;
    text-decoration:none;
    color:#667eea;
    margin-top:10px;
}

.links a:hover{
    color:#764ba2;
}

@media(max-width:480px){
    .loginbox{
        padding:25px;
    }
}
</style>
</head>

<body>

<div class="loginbox">

    <h1>Welcome Back</h1>

    <form>

        <p>Email</p>
        <input type="email" id="email" placeholder="Enter your email" required>

        <p>Password</p>
        <input type="password" id="pwd" placeholder="Enter your password" required>

        <input type="button" value="Login" onclick="login()">

        <div class="links">
            <a href="sreg.html">Create New Account</a>
            <a href="admin.html">Login as Admin</a>
        </div>

    </form>

</div>

<script src="https://www.gstatic.com/firebasejs/5.0.0/firebase.js"></script>
<script src="firebase.js"></script>

</body>
</html>
