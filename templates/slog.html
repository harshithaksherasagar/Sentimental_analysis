<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    width:100%;
    max-width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.title{
    text-align:center;
    font-size:32px;
    margin-bottom:30px;
}

.field{
    margin-bottom:20px;
}

.field label{
    display:block;
    margin-bottom:8px;
}

.field input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    cursor:pointer;
}

.link{
    text-align:center;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Login</div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="email">
    </div>

    <div class="field">
        <label>Password</label>
        <input type="password" id="pwd">
    </div>

    <button class="btn" type="button" onclick="login()">
        Login
    </button>

    <div class="link">
        <a href="sreg.html">Create Account</a>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/5.0.0/firebase.js"></script>
<script src="firebase.js"></script>

</body>
</html>
