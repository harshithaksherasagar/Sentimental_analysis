<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background: linear-gradient(135deg,#1d2671,#c33764);
    overflow-y:auto;
    padding:40px 20px;
}

        .container{
    width:100%;
    max-width:450px;
    padding:35px;
    border-radius:20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    animation: fadeIn 1s ease;
}
        h1{
            text-align:center;
            margin-bottom:25px;
            font-size:32px;
            letter-spacing:1px;
        }

        .input-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:15px;
            font-weight:500;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;
            background: rgba(255,255,255,0.15);
            color:white;
            font-size:15px;
            transition:0.3s;
        }

        input::placeholder{
            color:#ddd;
        }

        input:focus{
            background: rgba(255,255,255,0.25);
            transform:scale(1.02);
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background: linear-gradient(to right,#ff512f,#dd2476);
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-3px);
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        .output{
            margin-top:20px;
            text-align:center;
            font-size:16px;
            color:#fff;
            font-weight:500;
        }

        .plot{
            margin-top:25px;
            width:100%;
            border-radius:15px;
            box-shadow:0 4px 20px rgba(0,0,0,0.3);
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:450px){
            .container{
                width:90%;
                padding:25px;
            }
        }
        @media(max-width:500px){

    body{
        padding:20px 10px;
    }

    .container{
        padding:20px;
    }

    h1{
        font-size:28px;
    }

    .result-card h2,
    .chart-container h2{
        font-size:20px;
    }

    button{
        font-size:15px;
    }

    .plot{
        width:100%;
        height:auto;
    }
}

        .result-card{
    margin-top:25px;
    padding:20px;
    border-radius:18px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
    animation:fadeIn 0.8s ease;
}

.result-card h2{
    text-align:center;
    margin-bottom:15px;
    color:white;
    font-size:22px;
}

.sentiment{
    text-align:center;
    padding:12px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    margin-bottom:18px;
}

.positive{
    background: rgba(46, 204, 113,0.25);
    color:#7dffb3;
    border:1px solid #2ecc71;
}

.negative{
    background: rgba(231, 76, 60,0.25);
    color:#ff9c95;
    border:1px solid #e74c3c;
}

.neutral{
    background: rgba(241, 196, 15,0.25);
    color:#ffe082;
    border:1px solid #f1c40f;
}

.ai-box{
    padding:15px;
    border-radius:12px;
    background: rgba(255,255,255,0.08);
    color:#f5f5f5;
    font-size:15px;
    line-height:1.6;
    word-wrap:break-word;
}

.chart-container{
    margin-top:30px;
    padding:20px;
    border-radius:18px;
    background: rgba(255,255,255,0.12);
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
    text-align:center;
}

.chart-container h2{
    margin-bottom:20px;
    color:white;
}

.plot{
    width:100%;
    border-radius:15px;
    background:white;
    padding:10px;
}
    </style>
</head>

<body>

<div class="container">

    <h1>Feedback</h1>

    <form action="/submit" method="post" onsubmit="submitform1()" id="insert">

        <div class="input-group">
            <label for="uname">Username</label>
            <input 
                type="text" 
                id="uname" 
                name="uname"
                placeholder="Enter your username"
                required
            >
        </div>

        <div class="input-group">
            <label for="etext">Your Feedback</label>
            <input 
                type="text" 
                id="etext" 
                name="etext"
                placeholder="Write your feedback..."
                required
            >
        </div>

        <button type="submit">Submit Feedback</button>

    </form>

    {% if output %}

<div class="result-card">

    <h2>Sentiment Analysis Result</h2>

    {% if "NEGATIVE" in output|string %}
        <div class="sentiment negative">
            😔 Negative Feedback
        </div>
    {% elif "POSITIVE" in output|string %}
        <div class="sentiment positive">
            😊 Positive Feedback
        </div>
    {% else %}
        <div class="sentiment neutral">
            😐 Neutral Feedback
        </div>
    {% endif %}

    <div class="ai-box">
        <p>{{ output }}</p>
    </div>

</div>

{% endif %}

{% if plot_url %}

<div class="chart-container">
    <h2>Feedback Analytics</h2>
    <img class="plot" src="data:image/png;base64, {{ plot_url }}">
</div>

{% endif %}

</div>

<script src="https://www.gstatic.com/firebasejs/5.0.0/firebase.js"></script>
<script src="data.js"></script>

</body>
</html>
